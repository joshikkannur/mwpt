name: Deploy to Pantheon

on:
  push:
    branches:
      - master   # change to main if your repo uses main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 🔐 Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PANTHEON_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 codeserver.dev.b797900c-e341-4d03-82cd-1c0a92605d0c.drush.in >> ~/.ssh/known_hosts

      # 🚀 Push to Dev
      - name: Push to Pantheon Dev
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          git remote remove pantheon 2>/dev/null || true
          git remote add pantheon ssh://codeserver.dev.b797900c-e341-4d03-82cd-1c0a92605d0c@codeserver.dev.b797900c-e341-4d03-82cd-1c0a92605d0c.drush.in:2222/~/repository.git

          git push pantheon master --force

      # 📦 Install Terminus
      - name: Install Terminus
        run: |
          export TERMINUS_ALLOW_UNSUPPORTED_NEWER_PHP=1
          curl -O https://raw.githubusercontent.com/pantheon-systems/terminus-installer/master/builds/installer.phar
          php installer.phar install

      # 🔑 Authenticate Terminus
      - name: Authenticate Terminus
        run: |
          terminus auth:login --machine-token=${{ secrets.PANTHEON_MACHINE_TOKEN }}

      # 🔄 Deploy Dev → Test
      - name: Deploy to Test
        run: |
          terminus env:deploy joshsite.test \
            --note="Auto deploy from GitHub" \
            --sync-content \
            --updatedb \
            --yes